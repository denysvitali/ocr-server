name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Restore signing keystore
        run: echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > release.keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}

      - name: Run lint
        run: ./gradlew lintDebug

      - name: Install git-cliff
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Compute next version
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        id: appversion
        run: |
          git fetch --tags --force
          CURRENT_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          [ -z "$CURRENT_TAG" ] && CURRENT_TAG="v0.0.0"
          NEXT_TAG=$(git cliff --bumped-version 2>/dev/null | tail -n1 | tr -d '[:space:]' || true)
          if [ -z "$NEXT_TAG" ] || [ "$NEXT_TAG" = "$CURRENT_TAG" ]; then
            RELEASE=false
            VERSION_NAME="${CURRENT_TAG#v}"
            TAG="$CURRENT_TAG"
          else
            RELEASE=true
            VERSION_NAME="${NEXT_TAG#v}"
            TAG="$NEXT_TAG"
          fi
          CORE="${VERSION_NAME%%+*}"
          CORE="${CORE%%-*}"
          IFS=. read -r MAJOR MINOR PATCH <<<"$CORE"
          VERSION_CODE=$(( ${MAJOR:-0} * 10000 + ${MINOR:-0} * 100 + ${PATCH:-0} ))
          echo "release=${RELEASE}" >> "$GITHUB_OUTPUT"
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        if: steps.appversion.outputs.release == 'true'
        run: git cliff --unreleased --tag "${{ steps.appversion.outputs.tag }}" --strip all -o RELEASE_NOTES.md

      - name: Build release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          KEY_ALIAS: release
          KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          VERSION_NAME: ${{ steps.appversion.outputs.version_name }}
          VERSION_CODE: ${{ steps.appversion.outputs.version_code }}

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Upload APK as artifact
        if: steps.appversion.outputs.release == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk

      - name: Create release
        if: steps.appversion.outputs.release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.appversion.outputs.tag }}
          body_path: RELEASE_NOTES.md
          files: app/build/outputs/apk/release/*.apk
