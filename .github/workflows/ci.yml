name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Restore signing keystore
        run: echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > release.keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}

      - name: Run lint
        run: ./gradlew lintDebug

      - name: Derive next version
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        id: appversion
        run: |
          git fetch --tags --force
          LAST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [ -z "$LAST_TAG" ]; then
            MAJOR=0; MINOR=0; PATCH=0
          else
            CORE="${LAST_TAG#v}"
            CORE="${CORE%%+*}"
            CORE="${CORE%%-*}"
            IFS=. read -r MAJOR MINOR PATCH <<<"$CORE"
          fi
          NEW_PATCH=$(( ${PATCH:-0} + 1 ))
          VERSION_NAME="${MAJOR:-0}.${MINOR:-0}.${NEW_PATCH}"
          VERSION_CODE=$(( ${MAJOR:-0} * 10000 + ${MINOR:-0} * 100 + NEW_PATCH ))
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          KEY_ALIAS: release
          KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          VERSION_NAME: ${{ steps.appversion.outputs.version_name }}
          VERSION_CODE: ${{ steps.appversion.outputs.version_code }}

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Upload APK as artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v7
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk

      - name: Create release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.appversion.outputs.tag }}
          files: app/build/outputs/apk/release/*.apk
